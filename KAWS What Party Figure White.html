<!DOCTYPE html>

    <title>STUDIOA - Art Toy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: #f9f9f9;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #8f8f8f;
            padding: 10px 20px;
            color: white;
        }

        header img {
            height: 50px;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        nav button {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        nav button:hover {
            background-color: white;
            color: #333;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .product-details {
            display: flex;
            align-items: center;
            text-align: left;
            gap: 30px;
            max-width: 1000px;
            margin: auto;
        }

        .product-details img {
            max-width: 40%;
            height: auto;
            border-radius: 10px;
        }

        .product-text {
            max-width: 50%;
        }

        .product-text h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .product-text p {
            font-size: 16px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .product-details {
                flex-direction: column-reverse;
                text-align: center;
            }

            .product-details img {
                max-width: 80%;
            }

            .product-text {
                max-width: 90%;
            }
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
