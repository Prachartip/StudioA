<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIOA - Art Toy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: #f9f9f9;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #8f8f8f;
            padding: 10px 20px;
            color: white;
        }

        header img {
            height: 50px;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        nav button {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        nav button:hover {
            background-color: white;
            color: #333;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .product-details {
            display: flex;
            align-items: center;
            text-align: left;
            gap: 30px;
            max-width: 1000px;
            margin: auto;
        }

        .product-details img {
            max-width: 40%;
            height: auto;
            border-radius: 10px;
        }

        .product-text {
            max-width: 50%;
        }

        .product-text h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .product-text p {
            font-size: 16px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .product-details {
                flex-direction: column-reverse;
                text-align: center;
            }

            .product-details img {
                max-width: 80%;
            }

            .product-text {
                max-width: 90%;
            }
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://i.imgur.com/TuwOrmq.png" alt="STUDIOA Logo">
            <nav>
                <button onclick="window.location.href='index.html'">หน้าหลัก</button>
                <button onclick="window.location.href='bearbrick.html'">Bearbrick</button>
                <button onclick="window.location.href='kaws.html'">Kaws</button>
                <button onclick="window.location.href='crybaby.html'">Cry Baby</button>
                <button onclick="window.location.href='skullpanda.html'">SkullPanda</button>
            </nav>
        </header>

        <div class="content">
            <div class="product-details">
                <div class="product-text">
                    <!--<img src="https://bearbrick.com/WI/upimage/160924_q44m4f_0031_blogo.png" 
                        alt="Product 5" 
                        style="background-color: lightgray; display: block; padding: 20px; border-radius: 10px;">-->
                    <h1>CRYBABY Crying For Love Series Figures</h1>
                    <p>ยี่ห้อ : POP MART <br>
                        ขนาด : สูงโดยประมาณ 7-10 เซนติเมตร<br>
                        ส่วนประกอบ: PVC/ABS<br>

                        <br>อ้างอิงโดย<a href="https://www.popmart.com/th/products/1961/CRYBABY-Crying-For-Love-Series-Figures">POPMAR</a></p>
                </div>
                <img src="https://prod-thailand-res.popmart.com/default/20250122_101759_498431____1_____1200x1200.jpg" alt="Product 5">
            </div>
        </div>

        <footer>
            <p>© 2025 STUDIOA. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
